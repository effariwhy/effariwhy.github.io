<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local Storage</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  <div class="container mt-5">
    <h1>Local Storage</h1>
    
    <h2>Inspect Local Storage Keys</h2>
    
    <div class="mb-3">
      <button id="refreshLocalStorageKeys" class="btn btn-primary mb-3">Refresh Local Storage Keys</button>
      <select id="localStorageKeys" class="form-select mb-3">
        <option value="" disabled selected>Select a key</option>
      </select>
      <textarea id="localStorageContent" class="form-control" rows="10" readonly></textarea>
    </div>

    <h2>Save Key Contents to GitHub</h2>
    
    <div class="mb-3">
      <input id="githubToken" class="form-control" type="password" placeholder="GitHub Personal Access Token">
    </div>
    <div class="mb-3">
      <input id="repoName" class="form-control" type="text" placeholder="Repository Name (e.g., username/repo)">
    </div>
    <div class="mb-3">
      <input id="filePath" class="form-control" type="text" placeholder="File Path in Repository (e.g., folder/file.txt)">
    </div>
    <button id="saveToGitHub" class="btn btn-secondary ms-2">Save to GitHub</button>
    <button id="saveSettings" class="btn btn-secondary ms-2">Save Github Settings</button>
  </div>

  <script>
    function refreshLocalStorageKeys() {
      const select = document.getElementById('localStorageKeys');
      select.innerHTML = '<option value="" disabled selected>Select a key</option>';

      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        const option = document.createElement('option');
        option.value = key;
        option.textContent = key;
        select.appendChild(option);
      }
    }

    function loadLocalStorageContent() {
      const selectedKey = document.getElementById('localStorageKeys').value;
      const content = localStorage.getItem(selectedKey);
      document.getElementById('localStorageContent').value = content || '';
    }

    document.getElementById('refreshLocalStorageKeys').addEventListener('click', refreshLocalStorageKeys);
    document.getElementById('localStorageKeys').addEventListener('change', loadLocalStorageContent);

    // Automatically populate the select input on page load
    window.addEventListener('DOMContentLoaded', () => {
      refreshLocalStorageKeys();

      // Populate input fields with last known values from localStorage
      document.getElementById('githubToken').value = localStorage.getItem('githubToken') || '';
      document.getElementById('repoName').value = localStorage.getItem('repoName') || '';
      document.getElementById('filePath').value = localStorage.getItem('filePath') || '';
    });

    document.getElementById('saveToGitHub').addEventListener('click', async () => {
      const token = document.getElementById('githubToken').value;
      const repo = document.getElementById('repoName').value;
      const path = document.getElementById('filePath').value;
      const content = document.getElementById('localStorageContent').value;

      if (!token || !repo || !path) {
        alert('Please fill in all the fields.');
        return;
      }

      const url = `https://api.github.com/repos/${repo}/contents/${path}`;

      // Get the current file SHA if it exists
      let sha = null;
      try {
        const response = await fetch(url, {
          headers: {
            Authorization: `token ${token}`
          }
        });
        if (response.ok) {
          const data = await response.json();
          sha = data.sha;
        }
      } catch (error) {
        console.error('Error fetching file SHA with fetch:', error);

        // Fallback to XMLHttpRequest
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, false);
        xhr.setRequestHeader('Authorization', `token ${token}`);
        xhr.send();

        if (xhr.status === 200) {
          const data = JSON.parse(xhr.responseText);
          sha = data.sha;
        } else {
          console.error('Error fetching file SHA with XMLHttpRequest:', xhr.responseText);
        }
      }

      // Save the file to GitHub
      const body = {
        message: 'Save textarea content to GitHub',
        content: btoa(content),
        sha: sha
      };

      try {
        const response = await fetch(url, {
          method: 'PUT',
          headers: {
            Authorization: `token ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });

        if (response.ok) {
          alert('File saved to GitHub successfully!');
        } else {
          const errorData = await response.json();
          console.error('Error saving file to GitHub with fetch:', errorData);

          // Fallback to XMLHttpRequest
          const xhr = new XMLHttpRequest();
          xhr.open('PUT', url, true);
          xhr.setRequestHeader('Authorization', `token ${token}`);
          xhr.setRequestHeader('Content-Type', 'application/json');
          xhr.onload = function () {
            if (xhr.status === 200) {
              alert('File saved to GitHub successfully!');
            } else {
              console.error('Error saving file to GitHub with XMLHttpRequest:', xhr.responseText);
              alert('Failed to save file to GitHub.');
            }
          };
          xhr.send(JSON.stringify(body));
        }
      } catch (error) {
        console.error('Error saving file to GitHub with fetch:', error);

        // Fallback to XMLHttpRequest
        const xhr = new XMLHttpRequest();
        xhr.open('PUT', url, true);
        xhr.setRequestHeader('Authorization', `token ${token}`);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.onload = function () {
          if (xhr.status === 200) {
            alert('File saved to GitHub successfully!');
          } else {
            console.error('Error saving file to GitHub with XMLHttpRequest:', xhr.responseText);
            alert('Failed to save file to GitHub.');
          }
        };
        xhr.send(JSON.stringify(body));
      }
    });

    document.getElementById('saveSettings').addEventListener('click', () => {
      const token = document.getElementById('githubToken').value;
      const repo = document.getElementById('repoName').value;
      const path = document.getElementById('filePath').value;

      // Save input values to localStorage
      localStorage.setItem('githubToken', token);
      localStorage.setItem('repoName', repo);
      localStorage.setItem('filePath', path);

      alert('Settings saved successfully!');
    });
  </script>
</body>

</html>
