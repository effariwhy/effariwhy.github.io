<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email Local Storage</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  <div class="container mt-5">
    <h1>Email Local Storage</h1>
    <div class="mb-3">
      <textarea id="localStorageContent" class="form-control" rows="10" readonly></textarea>
    </div>
    <button id="refreshLocalStorage" class="btn btn-primary">Refresh Local Storage</button>
  </div>

  <script>
    function loadLocalStorage() {
      const localStorageData = JSON.stringify(localStorage, null, 2);
      document.getElementById('localStorageContent').value = localStorageData;
    }

    document.getElementById('refreshLocalStorage').addEventListener('click', loadLocalStorage);

    // Automatically load localStorage content on page load
    window.addEventListener('DOMContentLoaded', loadLocalStorage);
  </script>
</body>
</html>
