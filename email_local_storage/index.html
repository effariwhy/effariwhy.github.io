<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email Local Storage</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <div class="container mt-5">
    <h1>Email Local Storage</h1>
    <div class="mb-3">
      <textarea id="localStorageContent" class="form-control" rows="10" readonly></textarea>
    </div>
    <button id="showLocalStorage" class="btn btn-primary">Show Local Storage</button>
  </div>

  <script>
    document.getElementById('showLocalStorage').addEventListener('click', function() {
      const localStorageData = JSON.stringify(localStorage, null, 2);
      document.getElementById('localStorageContent').value = localStorageData;
    });
  </script>
</body>
</html>
